            date: "2024 – Apr 2026"
            content: |-
              Operated as the company's sole sales and purchasing lead, running the full sales cycle end-to-end — 15–20 inbound leads daily, site visits, quoting, and closing 5–6 deals per month.

              - Won and managed 5 commercial contracts for venues up to 5,000 sq ft.
              - Negotiated 10–15% supplier price reductions while maintaining competitive customer quotes.
              - Managed ~$200K annual purchasing budget across 3 suppliers with end-to-end order fulfillment.
              - Protected margin on every deal by controlling both the cost and revenue sides of each transaction.

      - company: "The Beer Store"
        companyUrl: "https://www.thebeerstore.ca"
        jobs:
          - name: "Supply Chain & Accounts Payable Specialist"
            date: "2022 – 2024"
            content: |-
              Managed vendor relationships and purchase orders in SAP ERP across $2–3M in monthly vendor spend.

              - Resolved 50–100 vendor discrepancies monthly through investigation and negotiation.
              - Supported month-end reporting and distribution operations at one of Ontario's largest beverage networks.
              - Strengthened long-term supplier relationships through consistent follow-through and problem resolution.

      - company: "Incosaca"
        companyUrl: "#"
        jobs:
          - name: "Owner / Procurement Director"
            date: "2010 – 2018"
            content: |-
              Founded and operated a procurement business managing 30+ supplier relationships and an ~$800K CAD annual purchasing budget.

              - Negotiated multi-year commercial contracts, payment terms, and delivery performance standards.
              - Sustained business profitability over 8 years through disciplined cost control and supplier partnerships.

      - company: "CORPOZULIA"
        companyUrl: "#"
        jobs:
          - name: "Purchasing Manager"
            date: "2007 – 2009"
            content: "Managed supplier contract negotiation and maintained vendor scorecards for regional government procurement operations."

      - company: "Institute of Technology of Maracaibo"
        companyUrl: "#"
        jobs:
          - name: "Budget Analyst"
            date: "2005 – 2007"
            content: "Prepared and monitored institutional budgets, performed variance reporting, and supported financial planning for the department."

