  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I am a Data Analytics professional combining 15+ years of operational business experience with technical skills in data analysis and visualization. Currently completing my Diploma in Data Analytics at triOS College in Toronto.

      My background spans B2B sales, purchasing management, supply chain operations, and accounts payable — roles where I managed purchasing portfolios up to $800K, oversaw $2–3M in monthly vendor spend through SAP ERP, resolved 50–100 invoice discrepancies monthly, and closed commercial contracts worth up to 5,000 sq ft of service. Every role required me to read data fast and act on it.

      I am now formalizing those instincts with SQL, Python, Tableau, and Excel — not starting from scratch, but building the technical layer on top of a decade and a half of knowing what the numbers actually mean inside a business.

      Bilingual in English and Spanish. WES-evaluated degrees in Accounting and Public Administration.
    skills:
      enable: true
      title: "Technical Skills & Tools:"
      items:
        - "SQL (queries, joins, aggregations, subqueries)"
        - "Python (Pandas, NumPy, Matplotlib)"
        - "Tableau"
        - "Advanced Excel (Pivot Tables, Power Query, VLOOKUP)"
        - "SAP ERP"
        - "Data Visualization & Dashboarding"
        - "Statistical Analysis & Reporting"
        - "RFM & Customer Segmentation"
        - "Data Cleaning & Wrangling"
        - "Microsoft Office Suite"

