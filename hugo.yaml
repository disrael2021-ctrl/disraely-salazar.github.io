  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.png"
    content: |-
      I am a Data Analytics student at triOS College in Toronto, ON, combining 10+ years of hands-on business experience with emerging technical skills in data analysis and visualization.

      My professional background spans B2B sales, purchasing management, supply chain operations, and accounts payable — roles that required constant data interpretation, margin analysis, and decision-making under pressure. Now I am formalizing those instincts with tools like SQL, Python, Tableau, and advanced Excel to build a career in data analytics and business intelligence.

      I am bilingual in English and Spanish, and I hold international credential evaluations (WES) for two university degrees from Venezuela.
    skills:
      enable: true
      title: "Technical skills I am building:"
      items:
        - "SQL"
        - "Python (Pandas, NumPy)"
        - "Tableau"
        - "Advanced Excel"
        - "SAP ERP"
        - "Data Visualization"
        - "Pivot Tables & VLOOKUP"
        - "Microsoft Office Suite"

  # Experience
  experience:
