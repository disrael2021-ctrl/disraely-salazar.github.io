  # Projects
  projects:
    enable: true
    items:
      - title: Sales Performance Dashboard
        content: |-
          Built an Excel dashboard tracking monthly sales performance, lead conversion rates, and margin trends using Pivot Tables, VLOOKUP, and conditional formatting. Modelled on real data from building materials distribution.

          Key finding: 3 of 7 product lines accounted for 80% of monthly margin — concentrating sales effort on highest-value opportunities. Dynamic filters allow weekly vs. monthly performance comparison at a glance.
        image: /images/projects/profile.png
        featured:
          name: GitHub Profile
          link: https://github.com/disraelysalazar
        badges:
          - "Excel"
          - "Pivot Tables"
          - "Data Visualization"
        links:
          - icon: fab fa-github
            url: https://github.com/disraelysalazar

      - title: Supply Chain Data Analysis
        content: |-
          Applied SQL and Python (Pandas) to analyze supplier performance in a simulated distribution dataset modelled on real supply chain operations I managed professionally at The Beer Store and Incosaca.

          Key finding: Identified 2 supplier patterns with 35%+ delivery deviation from contracted timelines — consistent with the type of discrepancies I resolved in $2–3M/month operations. Estimated $12–15K annual cost impact in rework and expediting.
        image: /images/projects/converter.jpg
        featured:
          name: GitHub Profile
          link: https://github.com/disraelysalazar
        badges:
          - "SQL"
          - "Python"
          - "Pandas"
        links:
          - icon: fab fa-github
            url: https://github.com/disraelysalazar

      - title: Customer Segmentation Analysis
        content: |-
          Performed RFM (Recency, Frequency, Monetary) segmentation on a retail dataset using Python and visualized customer groups in Tableau to support targeting and retention decisions.

          Key finding: Segmented 1,200+ customers into 4 behavioral groups. The top "Champions" segment — 14% of customers — drove 61% of total revenue. Insight directly supports upsell and loyalty prioritization strategy.
        image: /images/projects/profile2.jpg
        featured:
          name: GitHub Profile
          link: https://github.com/disraelysalazar
        badges:
          - "Python"
          - "Tableau"
          - "RFM Analysis"
        links:
          - icon: fab fa-github
